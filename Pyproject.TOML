[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-github-advanced"
version = "0.1.0"
description = "Advanced GitHub MCP server — repo analysis, PR management, code review, CI/CD monitoring"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Şeyhmus OK", email = "seyhmusok01@gmail.com" }
]
keywords = ["mcp", "github", "code-review", "developer-tools", "pr-management", "ci-cd"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "mcp>=1.19.0",
    "httpx>=0.28.0",
    "authlib>=1.3.0",
    "redis[hiredis]>=5.0.0",
    "tenacity>=8.0.0",
    "python-dotenv>=1.0.0",
    "anyio>=4.7.0",
    "langchain-google-genai>=2.0.0",
    "langchain>=0.3.0",
    "langgraph>=0.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "respx>=0.21.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.8.0",
]

[project.scripts]
mcp-github-advanced = "mcp_github_advanced.server:main"

[project.urls]
Homepage   = "https://github.com/iamseyhmus7/mcp-github-advanced"
Repository = "https://github.com/iamseyhmus7/mcp-github-advanced"
Issues     = "https://github.com/iamseyhmus7/mcp-github-advanced/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_github_advanced"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]